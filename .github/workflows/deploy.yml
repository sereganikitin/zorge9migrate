name: Deploy site to production

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sanity check (server reachable)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "echo connected as \$(whoami) on \$(hostname); test -d ${{ secrets.DEPLOY_PATH }}"

      - name: Rsync site/ to server
        # NB: --delete is INTENTIONALLY NOT USED — we track only a subset of htdocs.
        # --chown ставит владельца www-data:www-data сразу при копии (требует root на dst, у нас он есть).
        # --itemize-changes печатает список изменённых файлов в "step output" — удобно для логов deploy.
        run: |
          rsync -avz --human-readable --itemize-changes \
            --chown=www-data:www-data \
            --exclude='*.bak' --exclude='*.bak-*' --exclude='*.padfix-bak' --exclude='*.padfix2-bak' \
            --exclude='*.embed-bak' --exclude='*.landings-bak' --exclude='.DS_Store' \
            --exclude='hydra/svg/map.json' --exclude='hydra/svg/outlines.json' --exclude='hydra/svg/floor_raster/' \
            --exclude='hydra/svg/map_com.json' --exclude='hydra/svg/outlines_com.json' --exclude='hydra/svg/floor_com/' \
            --exclude='hydra/json/com.json' --exclude='hydra/json/data.json' \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            site/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Remove superseded files (rsync runs without --delete)
        # The /main route was a snapshot of the old Wolf homepage so the
        # landing's footer could link "back to the old site".  We dropped
        # that direction: now the old pages route TO the landing instead,
        # never the other way around.  Strip whatever was previously synced.
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "rm -rf ${{ secrets.DEPLOY_PATH }}/main ${{ secrets.DEPLOY_PATH }}/promo"

      - name: Reload PHP-FPM (clear opcache)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "systemctl reload php8.3-fpm && echo deployed: \$(date -u +%FT%TZ)"

      - name: Smoke test
        run: |
          # -L follows 301: nginx redirects /apartments -> /apartments/ (directory canonical).
          # /main is the entry point to the old-site copy (Wolf CMS page id=1),
          # restored via nginx `location = /main` — see setup-db-and-nginx.sh.
          for url in / /apartments /office /pent /retail /about /sitemap.xml /main; do
            code=$(curl -skL -o /dev/null -w '%{http_code}' "https://zorge9.infoseledka.ru$url")
            echo "  $url HTTP $code"
            test "$code" = "200" || (echo "FAIL $url"; exit 1)
          done
          # /promo/* must 301 to their Wolf-served replacements.
          for pair in "/promo/commercial:/retail" "/promo/office:/office" "/promo/pent:/pent"; do
            src="${pair%%:*}"; dst="${pair##*:}"
            loc=$(curl -skI -A Mozilla "https://zorge9.infoseledka.ru${src}" | grep -i '^location:' | awk '{print $2}' | tr -d '\r')
            echo "  ${src} → ${loc}"
            echo "${loc}" | grep -qE "${dst}$" || (echo "FAIL: expected ${src} → ${dst}, got ${loc}"; exit 1)
          done
