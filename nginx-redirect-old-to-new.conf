# ═══════════════════════════════════════════════════════════════════════════
#  301-РЕДИРЕКТ СТАРОГО ДОМЕНА НА ОСНОВНОЙ
#  old.zorge9.com  →  https://zorge9.com   (объединение сайтов)
#
#  Path-preserving: /любой/путь?q=1  →  https://zorge9.com/любой/путь?q=1
#  Код 301 (постоянный) передаёт накопленный поисковый вес старого домена
#  основному. Структура URL общая (Wolf-страницы сохранены), поэтому каждая
#  старая страница ведёт на свой точный аналог — это лучший вариант для SEO
#  (не «всё на главную», а страница-в-страницу).
#
#  ── ЭТО ПРОДАКШН-КОНФИГ. На тестовой копии НЕ подключать: ──
#     он увёл бы тест-копию на боевой домен. Активируется при go-live.
#
#  УСТАНОВКА на боевом сервере:
#    1) sudo cp nginx-redirect-old-to-new.conf \
#            /etc/nginx/sites-available/redirect-old-zorge9
#    2) sudo ln -sf /etc/nginx/sites-available/redirect-old-zorge9 \
#                   /etc/nginx/sites-enabled/redirect-old-zorge9
#    3) выпустить TLS-сертификат для old.zorge9.com:
#         sudo certbot --nginx -d old.zorge9.com -d www.old.zorge9.com
#    4) sudo nginx -t && sudo systemctl reload nginx
#
#  ПРОВЕРКА:
#    curl -sI https://old.zorge9.com/about/developer | grep -i location
#      → Location: https://zorge9.com/about/developer
# ═══════════════════════════════════════════════════════════════════════════

# HTTP старого домена → HTTPS основного
server {
    listen 80;
    listen [::]:80;
    server_name old.zorge9.com www.old.zorge9.com;
    return 301 https://zorge9.com$request_uri;
}

# HTTPS старого домена → HTTPS основного (нужен сертификат old.zorge9.com)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name old.zorge9.com www.old.zorge9.com;

    ssl_certificate     /etc/letsencrypt/live/old.zorge9.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/old.zorge9.com/privkey.pem;

    return 301 https://zorge9.com$request_uri;
}
